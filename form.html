<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <h2> Registration Form</h2>
    <form>
        <label>Full Name : </label><br>
        <input type = "test" name = "fullname"><br><br>

        <label>Email : </label><br>
        <input type = "email" name = "email"><br><br>

        <label>Phone. No</label><br>
        <input type = "text" name = "phno"><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender" value="Male"> Male
        <input type="radio" name="gender" value="Female"> Female
        <input type="radio" name="gender" value="Walmart Bag"> Walmart Bag<br><br>

        <label>Skills</label><br>
        <input type="checkbox" name="skill" value="DSA"> DSA
        <input type="checkbox" name="skill" value="DBMS"> DBMS
        <input type="checkbox" name="skill" value="OS"> OS
        <input type="checkbox" name="skill" value="Data Analytics"> Data Analytics
        <input type="checkbox" name="skill" value="AI/ML"> AI/Ml<br><br>

        <label>Date of Birth:</label><br>
        <input type="date" name="dob"><br><br>

        <label>File Upload:</label>
        <input type="file" name ="file"><br><br>

        <input type="submit" value="Register">
        <input type="reset" value="Clear">
    </form>
</body>
</html>
